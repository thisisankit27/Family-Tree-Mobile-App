name: family_tree_app
description: A polished family tree mobile application to preserve family history across generations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.2.0

  # Database (Drift ORM — familiar to Spring/JPA devs)
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # Serialization
  json_annotation: ^4.8.1

  # Image Handling
  image_picker: ^1.0.7

  # File I/O & Sharing
  file_picker: 12.0.0-beta.5
  share_plus: ^13.1.0

  # PDF Export
  pdf: ^3.10.8
  printing: ^5.12.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0

  # UI
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation (run: flutter pub run build_runner build)
  drift_dev: ^2.15.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
